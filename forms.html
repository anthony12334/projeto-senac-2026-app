<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajei: forms</title>
    <link rel="stylesheet" href="./style/forms.css">
    <script type="module" src="./scripts/forms.js"></script>
</head>

<body>

    <div id="container">

        <header>
            <scripts src="./scripts/forms.js" defer></scripts>
            <img src="./images/logo.png" alt="" . />
            <a class="link-do-cabecalho" href="./index.html">Viajei</a>
            <a class="link-do-cabecalho" href="./about.html">SOBRE</a>
            <a class="link-do-cabecalho" href="forms.html">Conte sua história!</a>
            <a class="link-do-cabecalho" href="./login.html">Login</a>
            <script src="./scripts/menu.js" defer></script>


            <div class="toggle"></div>

        </header>

        <main>
            <form id="post-form">
                <label for="autor"> Autor: </label>
                <input id="autor" type="text" name="autor" placeholder="Ex: flávio_do_grau123">


                <label for="titulo"> Título da historia: </label>
                <input id="titulo" type="text" name="titulo" placeholder="Ex: minha história">

                <label for="email"> Email: </label>
                <input id="email" type="email" name="email" placeholder="fláviodograu@xxxx.com">

                <label for="historia"> Historia: </label>
                <textarea id="historia" cols="12" rows="12" name="historia" placeholder="tudo começou..."></textarea>

                <button type="submit"> Enviar </button>

            </form>

            <div id="historias">
                <h2> Descubra sua próxima história favorita...</h2>
            </div>
        </main>
        <dialog id="modal">
            <button autofocus> X </button>
            <div id="modal-content"></div>
        </dialog>
